databases:
  - name: tellolabs-db
    plan: free
    region: singapore
    databaseName: tellolabs
    user: tellolabs

services:
  - type: web
    name: tellolabs
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    region: singapore
    numInstances: 1
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3030"
      - key: DATABASE_URL
        fromDatabase:
          name: tellolabs-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: RUNWARE_API_KEY
        sync: false
      - key: WAVESPEED_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_MAPBOX_TOKEN
        value: pk.eyJ1Ijoia2ltc29vanVuIiwiYSI6ImNtbm12dnpwdjA1NjQyb3NpdzkwaTdmYmsifQ.Pr0CiHLxv0LH46Lt8FLhuw
      - key: REMOTION_MAPBOX_TOKEN
        value: pk.eyJ1Ijoia2ltc29vanVuIiwiYSI6ImNtbm12dnpwdjA1NjQyb3NpdzkwaTdmYmsifQ.Pr0CiHLxv0LH46Lt8FLhuw
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        value: pk_test_c3RpcnJlZC1jaG93LTkwLmNsZXJrLmFjY291bnRzLmRldiQ
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /login
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /register
    disk:
      name: tellolabs-media
      mountPath: /app/public
      sizeGB: 10
    healthCheckPath: /
